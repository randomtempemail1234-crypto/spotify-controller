<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Controller</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1DB954;
    --black: #121212;
    --dark: #181818;
    --card: #282828;
    --card-hover: #333;
    --text: #fff;
    --text-dim: #B3B3B3;
    --text-faint: #535353;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* LOGIN */
  #login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; gap: 20px; padding: 32px;
    background: linear-gradient(160deg, #1a1a2e 0%, #121212 60%);
  }
  #login-screen svg { width: 56px; height: 56px; }
  #login-screen h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; text-align: center; }
  #login-screen p { color: var(--text-dim); font-size: 14px; text-align: center; max-width: 280px; line-height: 1.6; }
  .btn-green { background: var(--green); color: #000; border: none; border-radius: 500px; padding: 14px 36px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; width: 100%; max-width: 280px; }
  .btn-clear { background: none; border: none; color: var(--text-faint); font-size: 12px; cursor: pointer; text-decoration: underline; font-family: inherit; margin-top: 4px; }
  .error-box { background: #2a1111; border: 1px solid #ff6b6b; border-radius: 8px; padding: 12px 16px; font-size: 12px; color: #ff9999; max-width: 320px; line-height: 1.6; word-break: break-all; }

  /* APP LAYOUT - mobile portrait: stacked */
  #app { display: none; flex-direction: column; flex: 1; overflow: hidden; }

  /* TABS */
  .tabs { display: flex; background: #000; border-bottom: 1px solid #222; flex-shrink: 0; }
  .tab { flex: 1; padding: 14px 8px; font-size: 13px; font-weight: 600; text-align: center; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; transition: color 0.15s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  /* PANELS */
  .panel { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
  .panel.active { display: flex; }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 2px; }

  /* PLAYLIST PANEL */
  #panel-playlists { padding: 12px; gap: 4px; }
  .playlist-item { display: flex; align-items: center; gap: 12px; padding: 10px 8px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .playlist-item:active { background: var(--card); }
  .playlist-item img { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; background: var(--card-hover); flex-shrink: 0; }
  .playlist-item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .playlist-item-meta { font-size: 12px; color: var(--text-dim); }

  /* TRACKS PANEL */
  #panel-tracks { padding: 0; }
  .tracks-header { padding: 16px; background: linear-gradient(180deg, #2a2a2a, var(--black)); flex-shrink: 0; }
  .tracks-header img { width: 120px; height: 120px; border-radius: 6px; object-fit: cover; background: var(--card-hover); margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .tracks-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .tracks-header p { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
  .play-all-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--green); color: #000; border: none; border-radius: 500px; padding: 10px 24px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .track-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: background 0.15s; }
  .track-row:active { background: var(--card); }
  .track-row.playing .track-name { color: var(--green); }
  .track-row img { width: 44px; height: 44px; border-radius: 3px; object-fit: cover; background: var(--card-hover); flex-shrink: 0; }
  .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-artist { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-duration { font-size: 12px; color: var(--text-dim); flex-shrink: 0; margin-left: auto; }
  .device-warning { margin: 12px 16px; background: #2a2000; border: 1px solid #6a5000; border-radius: 8px; padding: 12px; font-size: 12px; color: #ffd700; line-height: 1.5; }

  /* QUEUE PANEL */
  #panel-queue { padding: 12px; }
  .queue-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 8px 4px 4px; color: var(--text-dim); }
  .queue-label.green { color: var(--green); }
  .queue-item { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-radius: 6px; }
  .queue-item img { width: 40px; height: 40px; border-radius: 3px; object-fit: cover; background: var(--card-hover); flex-shrink: 0; }
  .queue-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-item-artist { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* NOW PLAYING BAR */
  .now-playing-bar { background: #181818; border-top: 1px solid #2a2a2a; padding: 10px 16px 16px; flex-shrink: 0; }
  .np-track { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .np-track img { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; background: var(--card); flex-shrink: 0; }
  .np-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artist { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-controls { display: flex; flex-direction: column; gap: 8px; }
  .np-buttons { display: flex; align-items: center; justify-content: center; gap: 28px; }
  .ctrl-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; }
  .ctrl-btn.play-pause { background: white; color: black; width: 42px; height: 42px; border-radius: 50%; }
  .progress-row { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-dim); }
  .progress-bar { flex: 1; height: 3px; background: var(--text-faint); border-radius: 2px; cursor: pointer; }
  .progress-fill { height: 100%; background: var(--text-dim); border-radius: 2px; }

  /* MISC */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--text-dim); gap: 12px; font-size: 14px; padding: 40px; text-align: center; }
  .loading { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text-dim); font-size: 13px; gap: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--text-faint); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
  <h1>Spotify Controller</h1>
  <p>Browse playlists and control Spotify playback. Open Spotify in another Safari tab to play audio.</p>
  <div id="login-error" style="display:none" class="error-box"></div>
  <button class="btn-green" onclick="login()">Connect with Spotify</button>
  <button class="btn-clear" onclick="clearAuth()">Clear saved login &amp; start fresh</button>
</div>

<!-- APP -->
<div id="app">
  <div class="tabs">
    <div class="tab active" id="tab-playlists" onclick="switchTab('playlists')">Playlists</div>
    <div class="tab" id="tab-tracks" onclick="switchTab('tracks')">Songs</div>
    <div class="tab" id="tab-queue" onclick="switchTab('queue')">Queue</div>
  </div>

  <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
    <div class="panel active" id="panel-playlists">
      <div class="loading"><span class="spinner"></span>Loading playlists...</div>
    </div>
    <div class="panel" id="panel-tracks">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#535353" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Select a playlist to see its songs
      </div>
    </div>
    <div class="panel" id="panel-queue">
      <div class="empty-state">Queue will appear here once music is playing</div>
    </div>
  </div>

  <div class="now-playing-bar">
    <div class="np-track">
      <img id="np-art" src="" style="display:none">
      <div style="overflow:hidden;flex:1">
        <div class="np-name" id="np-name">Not playing</div>
        <div class="np-artist" id="np-artist">Open Spotify in another tab to start</div>
      </div>
    </div>
    <div class="np-controls">
      <div class="np-buttons">
        <button class="ctrl-btn" onclick="prevTrack()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-pause" onclick="togglePlay()">
          <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.64L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
      <div class="progress-row">
        <span id="np-elapsed">0:00</span>
        <div class="progress-bar" onclick="seekTrack(event)">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <span id="np-duration">0:00</span>
      </div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '924611eb26024497a967813388fcba01';
const REDIRECT_URI = 'https://randomtempemail1234-crypto.github.io/spotify-controller/callback.html';
const SCOPES = 'user-read-playback-state user-modify-playback-state playlist-read-private playlist-read-collaborative user-read-currently-playing';

let token = null;
let currentPlaylist = null;
let currentTrackId = null;
let isPlaying = false;
let progressInterval = null;
let trackDuration = 0;
let trackProgress = 0;

// ---- AUTH ----
function base64urlencode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function login() {
  const verifier = base64urlencode(crypto.getRandomValues(new Uint8Array(32)));
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = base64urlencode(digest);
  localStorage.setItem('pkce_verifier', verifier);
  const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}&code_challenge_method=S256&code_challenge=${challenge}`;
  window.location.href = url;
}

function clearAuth() {
  ['spotify_token','spotify_refresh_token','spotify_token_expiry','pkce_verifier'].forEach(k => localStorage.removeItem(k));
  showLoginError('Cleared! Now tap Connect with Spotify.');
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function refreshToken() {
  const refresh = localStorage.getItem('spotify_refresh_token');
  if (!refresh) { showLogin('No refresh token — please log in again.'); return false; }
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: refresh, client_id: CLIENT_ID })
  });
  const data = await res.json();
  if (data.access_token) {
    token = data.access_token;
    localStorage.setItem('spotify_token', token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
    return true;
  }
  showLogin('Session expired: ' + JSON.stringify(data));
  return false;
}

function showLogin(errorMsg) {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  if (errorMsg) showLoginError(errorMsg);
}

async function ensureToken() {
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) {
    const ok = await refreshToken();
    if (!ok) return false;
  }
  token = localStorage.getItem('spotify_token');
  return !!token;
}

// ---- API ----
async function api(endpoint, method = 'GET', body = null) {
  const ok = await ensureToken();
  if (!ok) return null;
  const opts = { method, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(`https://api.spotify.com/v1${endpoint}`, opts);
    if (res.status === 401) { showLogin('Token rejected by Spotify. Please log in again.'); return null; }
    if (res.status === 204 || res.status === 202) return null;
    if (!res.ok) { console.warn('API error', res.status, endpoint); return null; }
    return res.json().catch(() => null);
  } catch(e) {
    console.error('API fetch error:', e);
    return null;
  }
}

function msToTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

// ---- TABS ----
function switchTab(name) {
  ['playlists','tracks','queue'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('panel-' + t).classList.toggle('active', t === name);
  });
}

// ---- PLAYLISTS ----
async function loadPlaylists() {
  const data = await api('/me/playlists?limit=50');
  const panel = document.getElementById('panel-playlists');
  if (!data || !data.items) {
    panel.innerHTML = `<div class="empty-state"><span style="color:#ff9999">Failed to load playlists.</span><br><small style="color:var(--text-faint)">Check that your Redirect URI in the Spotify Developer Dashboard matches exactly:<br><code style="color:var(--green);font-size:11px">${REDIRECT_URI}</code></small><br><button class="btn-clear" style="color:var(--green)" onclick="clearAuth()">Log out and try again</button></div>`;
    return;
  }
  panel.innerHTML = '';
  data.items.forEach(pl => {
    const img = pl.images?.[0]?.url || '';
    const div = document.createElement('div');
    div.className = 'playlist-item';
    div.innerHTML = `<img src="${img}" onerror="this.style.background='#333';this.removeAttribute('src')"><div style="overflow:hidden"><div class="playlist-item-name">${pl.name}</div><div class="playlist-item-meta">${pl.tracks.total} songs</div></div>`;
    div.onclick = () => { loadTracks(pl); switchTab('tracks'); };
    panel.appendChild(div);
  });
}

// ---- TRACKS ----
async function loadTracks(pl) {
  currentPlaylist = pl;
  const panel = document.getElementById('panel-tracks');
  panel.innerHTML = `<div class="loading"><span class="spinner"></span>Loading...</div>`;
  const data = await api(`/playlists/${pl.id}/tracks?limit=100`);
  if (!data) { panel.innerHTML = `<div class="empty-state">Failed to load tracks.</div>`; return; }

  const img = pl.images?.[0]?.url || '';
  const state = await api('/me/player');
  const hasDevice = state && state.device;

  panel.innerHTML = `
    <div class="tracks-header">
      <img src="${img}" onerror="this.style.background='#333';this.removeAttribute('src')">
      <h2>${pl.name}</h2>
      <p>${pl.tracks.total} songs</p>
      ${!hasDevice ? `<div class="device-warning">⚠️ No active Spotify device. Open <strong>open.spotify.com</strong> in another Safari tab and play something first.</div>` : ''}
      <button class="play-all-btn" onclick="playPlaylist()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play All
      </button>
    </div>
    <div id="track-list" style="flex:1;overflow-y:auto"></div>`;

  const list = document.getElementById('track-list');
  data.items.forEach((item) => {
    if (!item.track) return;
    const t = item.track;
    const art = t.album?.images?.[0]?.url || '';
    const row = document.createElement('div');
    row.className = 'track-row' + (t.id === currentTrackId ? ' playing' : '');
    row.dataset.trackId = t.id;
    row.innerHTML = `
      <img src="${art}" onerror="this.style.background='#333';this.removeAttribute('src')">
      <div style="overflow:hidden;flex:1">
        <div class="track-name">${t.name}</div>
        <div class="track-artist">${t.artists.map(a => a.name).join(', ')}</div>
      </div>
      <div class="track-duration">${msToTime(t.duration_ms)}</div>`;
    row.onclick = () => playTrack(t.uri, pl.uri);
    list.appendChild(row);
  });
}

// ---- PLAYBACK ----
async function playTrack(uri, contextUri) {
  const body = contextUri ? { context_uri: contextUri, offset: { uri } } : { uris: [uri] };
  await api('/me/player/play', 'PUT', body);
  setTimeout(pollState, 600);
}

async function playPlaylist() {
  if (!currentPlaylist) return;
  await api('/me/player/play', 'PUT', { context_uri: currentPlaylist.uri });
  setTimeout(pollState, 600);
}

async function togglePlay() {
  if (isPlaying) await api('/me/player/pause', 'PUT');
  else await api('/me/player/play', 'PUT');
  setTimeout(pollState, 400);
}

async function nextTrack() { await api('/me/player/next', 'POST'); setTimeout(pollState, 600); }
async function prevTrack() { await api('/me/player/previous', 'POST'); setTimeout(pollState, 600); }

async function seekTrack(e) {
  if (!trackDuration) return;
  const bar = e.currentTarget;
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  trackProgress = Math.floor(pct * trackDuration);
  updateProgressUI();
  await api(`/me/player/seek?position_ms=${trackProgress}`, 'PUT');
}

function updateProgressUI() {
  if (!trackDuration) return;
  document.getElementById('progress-fill').style.width = Math.min(100, (trackProgress / trackDuration) * 100) + '%';
  document.getElementById('np-elapsed').textContent = msToTime(trackProgress);
  document.getElementById('np-duration').textContent = msToTime(trackDuration);
}

function startProgressTick() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (isPlaying) { trackProgress = Math.min(trackProgress + 1000, trackDuration); updateProgressUI(); }
  }, 1000);
}

// ---- POLL STATE ----
async function pollState() {
  const state = await api('/me/player');
  if (!state || !state.item) return;
  const t = state.item;
  isPlaying = state.is_playing;
  trackDuration = t.duration_ms;
  trackProgress = state.progress_ms;

  document.getElementById('np-name').textContent = t.name;
  document.getElementById('np-artist').textContent = t.artists.map(a => a.name).join(', ');
  const art = t.album?.images?.[0]?.url || '';
  const npArt = document.getElementById('np-art');
  npArt.src = art; npArt.style.display = art ? 'block' : 'none';
  document.getElementById('play-icon').style.display = isPlaying ? 'none' : 'block';
  document.getElementById('pause-icon').style.display = isPlaying ? 'block' : 'none';
  updateProgressUI();

  if (t.id !== currentTrackId) {
    currentTrackId = t.id;
    document.querySelectorAll('.track-row').forEach(r => r.classList.toggle('playing', r.dataset.trackId === t.id));
  }

  // Update queue tab
  const qData = await api('/me/player/queue');
  if (qData) {
    const qPanel = document.getElementById('panel-queue');
    qPanel.innerHTML = '';
    if (qData.currently_playing) {
      const cp = qData.currently_playing;
      const art = cp.album?.images?.[0]?.url || '';
      qPanel.innerHTML += `<div class="queue-label green">Now Playing</div><div class="queue-item"><img src="${art}"><div style="overflow:hidden"><div class="queue-item-name" style="color:var(--green)">${cp.name}</div><div class="queue-item-artist">${cp.artists.map(a=>a.name).join(', ')}</div></div></div>`;
    }
    if (qData.queue?.length) {
      qPanel.innerHTML += `<div class="queue-label">Next Up</div>`;
      qData.queue.slice(0, 30).forEach(t => {
        const art = t.album?.images?.[0]?.url || '';
        qPanel.innerHTML += `<div class="queue-item"><img src="${art}"><div style="overflow:hidden"><div class="queue-item-name">${t.name}</div><div class="queue-item-artist">${t.artists.map(a=>a.name).join(', ')}</div></div></div>`;
      });
    }
  }
}

// ---- INIT ----
async function init() {
  token = localStorage.getItem('spotify_token');
  if (!token) return; // stays on login screen

  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) {
    const ok = await refreshToken();
    if (!ok) return;
  }

  token = localStorage.getItem('spotify_token');
  if (!token) return;

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  await loadPlaylists();
  await pollState();
  startProgressTick();
  setInterval(pollState, 12000);
}

init();
</script>
