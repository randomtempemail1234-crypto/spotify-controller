<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spotify Controller</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1DB954;
    --green-bright: #1ed760;
    --black: #0a0a0a;
    --dark: #111111;
    --card: #1a1a1a;
    --card-hover: #242424;
    --border: #2a2a2a;
    --text: #FFFFFF;
    --text-dim: #a0a0a0;
    --text-faint: #444;
    --bar-h: 80px;
    --tab-h: 58px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Figtree', sans-serif; background: var(--black); color: var(--text); }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; gap: 20px; padding: 32px;
    background: radial-gradient(ellipse at 50% 30%, #1a3a25 0%, var(--black) 65%);
  }
  #login-screen .logo-mark { width: 72px; height: 72px; margin-bottom: 8px; }
  #login-screen h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; text-align: center; }
  #login-screen p { color: var(--text-dim); font-size: 14px; text-align: center; max-width: 280px; line-height: 1.6; }
  .btn-green {
    background: var(--green); color: #000; border: none; border-radius: 500px;
    padding: 16px 40px; font-size: 14px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.5px; text-transform: uppercase; font-family: inherit;
    transition: background 0.15s, transform 0.1s; width: 100%; max-width: 280px;
  }
  .btn-green:active { background: var(--green-bright); transform: scale(0.98); }
  .btn-clear {
    background: none; border: none; color: var(--text-faint); font-size: 12px;
    cursor: pointer; text-decoration: underline; font-family: inherit; padding: 4px;
  }

  /* ── APP SHELL ── */
  #app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ── TAB BAR ── */
  .tab-bar {
    display: flex; background: var(--dark); border-bottom: 1px solid var(--border);
    flex-shrink: 0; height: var(--tab-h);
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; background: none; border: none; color: var(--text-faint); cursor: pointer;
    font-family: inherit; font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; transition: color 0.15s; padding: 8px 4px;
  }
  .tab-btn svg { flex-shrink: 0; }
  .tab-btn.active { color: var(--green); }
  .tab-btn.active svg { stroke: var(--green); }

  /* ── SCROLLABLE PANES ── */
  .pane {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(var(--bar-h) + 8px);
  }
  .pane::-webkit-scrollbar { display: none; }

  /* ── PLAYLISTS PANE ── */
  #pane-playlists { display: block; }
  #pane-tracks   { display: none; }
  #pane-queue    { display: none; }

  .pane-header {
    padding: 20px 16px 12px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--text-dim);
    position: sticky; top: 0; background: var(--black); z-index: 2;
    border-bottom: 1px solid var(--border);
  }

  .playlist-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; cursor: pointer; transition: background 0.12s;
    border-radius: 0;
  }
  .playlist-item:active { background: var(--card); }
  .playlist-item img {
    width: 48px; height: 48px; border-radius: 4px; object-fit: cover;
    background: var(--card-hover); flex-shrink: 0;
  }
  .playlist-item-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .playlist-item-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* ── TRACKS PANE ── */
  .tracks-back {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; cursor: pointer; background: var(--black);
    position: sticky; top: 0; z-index: 2; border-bottom: 1px solid var(--border);
  }
  .tracks-back svg { flex-shrink: 0; }
  .tracks-back-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .playlist-hero {
    display: flex; align-items: center; gap: 14px;
    padding: 16px; background: linear-gradient(180deg, #1a2a1d 0%, var(--black) 100%);
  }
  .playlist-hero img { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; background: var(--card); flex-shrink: 0; }
  .playlist-hero h2 { font-size: 18px; font-weight: 700; line-height: 1.2; }
  .playlist-hero p { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .play-all-btn {
    margin: 8px 16px 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--green); color: #000; border: none; border-radius: 500px;
    padding: 13px; font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: inherit; width: calc(100% - 32px); transition: background 0.15s;
  }
  .play-all-btn:active { background: var(--green-bright); }

  .track-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; cursor: pointer; transition: background 0.12s;
  }
  .track-row:active { background: var(--card); }
  .track-row.playing { background: rgba(29,185,84,0.08); }
  .track-row img { width: 44px; height: 44px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: var(--card); }
  .track-row-info { flex: 1; overflow: hidden; }
  .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-row.playing .track-name { color: var(--green); }
  .track-meta { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .track-duration { font-size: 12px; color: var(--text-dim); flex-shrink: 0; }

  /* ── QUEUE PANE ── */
  .queue-now-playing-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--green); padding: 16px 16px 8px;
  }
  .queue-next-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-dim); padding: 16px 16px 8px;
  }
  .queue-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  }
  .queue-item img { width: 44px; height: 44px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: var(--card); }
  .queue-item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-item-artist { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* ── NOW PLAYING BAR ── */
  .now-playing-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: #161616; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 0;
    z-index: 10; flex-shrink: 0;
  }
  .np-progress-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px 0; font-size: 10px; color: var(--text-faint);
  }
  .progress-bar {
    flex: 1; height: 3px; background: var(--border); border-radius: 2px;
    cursor: pointer; position: relative;
  }
  .progress-fill { height: 100%; background: var(--text-dim); border-radius: 2px; transition: width 1s linear; }
  .np-main-row {
    flex: 1; display: flex; align-items: center; gap: 10px; padding: 0 12px 8px;
  }
  .np-art { width: 38px; height: 38px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: var(--card); }
  .np-info { flex: 1; overflow: hidden; }
  .np-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artist { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-controls-row { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .ctrl-btn {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    transition: color 0.12s; -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { color: var(--text); }
  .ctrl-play {
    background: white; color: black; width: 34px; height: 34px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-play:active { background: #ddd; }

  /* ── STATES ── */
  .loading-state { padding: 40px 16px; text-align: center; color: var(--text-dim); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .error-state { padding: 20px 16px; }
  .error-box { background: #2a1111; border: 1px solid #5a2020; border-radius: 8px; padding: 14px; color: #ff8080; font-size: 13px; line-height: 1.5; }
  .error-box a { color: var(--green); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .empty-state { padding: 60px 24px; text-align: center; color: var(--text-faint); font-size: 13px; }

  /* ── DEBUG ── */
  #debug {
    position: fixed; top: 0; left: 0; right: 0; background: #001a00;
    color: var(--green); font-size: 11px; padding: 6px 12px; z-index: 999;
    display: none; font-family: monospace;
  }
</style>
</head>
<body>

<div id="debug"></div>

<!-- LOGIN -->
<div id="login-screen">
  <svg class="logo-mark" viewBox="0 0 24 24" fill="#1DB954">
    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
  </svg>
  <h1>Spotify Controller</h1>
  <p>Browse playlists and manage your queue — while Spotify plays in the background.</p>
  <button class="btn-green" onclick="login()">Connect with Spotify</button>
  <button class="btn-clear" onclick="clearAuth()">Clear saved login &amp; start fresh</button>
</div>

<!-- APP -->
<div id="app">
  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-playlists" onclick="switchTab('playlists')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Playlists
    </button>
    <button class="tab-btn" id="tab-tracks" onclick="switchTab('tracks')" style="display:none">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      Tracks
    </button>
    <button class="tab-btn" id="tab-queue" onclick="switchTab('queue')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15V6m-3.5 9V4M18 20h.01M15 9H3M15 12H3M15 6H3M15 18H3"/></svg>
      Queue
    </button>
  </div>

  <!-- Pane: Playlists -->
  <div class="pane" id="pane-playlists">
    <div class="pane-header">Your Playlists</div>
    <div id="playlist-list">
      <div class="loading-state"><div class="spinner"></div><span>Loading playlists…</span></div>
    </div>
  </div>

  <!-- Pane: Tracks -->
  <div class="pane" id="pane-tracks">
    <div class="tracks-back" onclick="switchTab('playlists')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      <span class="tracks-back-title" id="tracks-back-title">Playlists</span>
    </div>
    <div id="tracks-content">
      <div class="loading-state"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </div>

  <!-- Pane: Queue -->
  <div class="pane" id="pane-queue">
    <div class="pane-header">Queue</div>
    <div id="queue-list">
      <div class="empty-state">Start playing something in Spotify,<br>then your queue will appear here.</div>
    </div>
  </div>

  <!-- Now Playing Bar -->
  <div class="now-playing-bar">
    <div class="np-progress-row">
      <span id="np-elapsed">0:00</span>
      <div class="progress-bar" id="progress-bar" onclick="seekTrack(event)">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span id="np-duration">0:00</span>
    </div>
    <div class="np-main-row">
      <img class="np-art" id="np-art" src="" style="display:none">
      <div class="np-info">
        <div class="np-name" id="np-name">Not playing</div>
        <div class="np-artist" id="np-artist"></div>
      </div>
      <div class="np-controls-row">
        <button class="ctrl-btn" onclick="prevTrack()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-play" id="play-pause-btn" onclick="togglePlay()">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.64L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '924611eb26024497a967813388fcba01';
const REDIRECT_URI = 'https://randomtempemail1234-crypto.github.io/spotify-controller/callback.html';
const SCOPES = 'user-read-playback-state user-modify-playback-state playlist-read-private playlist-read-collaborative user-read-currently-playing';

let token = null;
let currentTrackId = null;
let isPlaying = false;
let trackDuration = 0;
let trackProgress = 0;
let progressInterval = null;

// ── Debug ──
function debug(msg) {
  const el = document.getElementById('debug');
  el.style.display = 'block';
  el.textContent = '🔧 ' + msg;
  console.log('[SpotifyCtrl]', msg);
}

// ── Auth ──
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

function base64urlencode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function login() {
  const verifier = base64urlencode(crypto.getRandomValues(new Uint8Array(32)));
  const encoder = new TextEncoder();
  const digest = await crypto.subtle.digest('SHA-256', encoder.encode(verifier));
  const challenge = base64urlencode(digest);
  localStorage.setItem('pkce_verifier', verifier);
  const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}&code_challenge_method=S256&code_challenge=${challenge}`;
  window.location.href = url;
}

async function refreshToken() {
  const refresh = localStorage.getItem('spotify_refresh_token');
  if (!refresh) { clearAuth(); return false; }
  debug('Refreshing token…');
  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: refresh, client_id: CLIENT_ID })
    });
    const data = await res.json();
    if (data.access_token) {
      token = data.access_token;
      localStorage.setItem('spotify_token', token);
      localStorage.setItem('spotify_token_expiry', Date.now() + (data.expires_in || 3600) * 1000);
      if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
      return true;
    }
  } catch(e) { debug('Refresh error: ' + e.message); }
  return false;
}

function clearAuth() {
  ['spotify_token','spotify_refresh_token','spotify_token_expiry','pkce_verifier'].forEach(k => localStorage.removeItem(k));
  token = null;
  showLogin();
}

// ── API ──
async function api(endpoint, method = 'GET', body = null) {
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) {
    const ok = await refreshToken();
    if (!ok) { showLogin(); return null; }
  }
  token = localStorage.getItem('spotify_token');
  const opts = { method, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(`https://api.spotify.com/v1${endpoint}`, opts);
    if (res.status === 401) { clearAuth(); return null; }
    if (res.status === 204 || res.status === 202) return null;
    if (!res.ok) { debug(`API ${res.status}: ${endpoint}`); return null; }
    return res.json().catch(() => null);
  } catch(e) { debug('Fetch error: ' + e.message); return null; }
}

function msToTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

// ── Tabs ──
function switchTab(name) {
  ['playlists','tracks','queue'].forEach(t => {
    const pane = document.getElementById('pane-' + t);
    const btn = document.getElementById('tab-' + t);
    if (!pane || !btn) return;
    pane.style.display = t === name ? 'block' : 'none';
    btn.classList.toggle('active', t === name);
  });
  if (name === 'queue') loadQueue();
}

// ── Playlists ──
async function loadPlaylists() {
  debug('Loading playlists…');
  const data = await api('/me/playlists?limit=50');
  const list = document.getElementById('playlist-list');
  if (!data || !data.items) {
    list.innerHTML = `<div class="error-state"><div class="error-box">Failed to load playlists. Your session may have expired.<br><br><a href="#" onclick="clearAuth()">Log in again</a></div></div>`;
    return;
  }
  list.innerHTML = '';
  data.items.forEach(pl => {
    if (!pl) return;
    const img = pl.images?.[0]?.url || '';
    const div = document.createElement('div');
    div.className = 'playlist-item';
    div.innerHTML = `
      <img src="${img}" onerror="this.style.background='#333';this.removeAttribute('src')">
      <div>
        <div class="playlist-item-name">${escHtml(pl.name)}</div>
        <div class="playlist-item-meta">${pl.tracks.total} songs</div>
      </div>`;
    div.onclick = () => openPlaylist(pl);
    list.appendChild(div);
  });
  debug('Playlists loaded ✓');
  setTimeout(() => { document.getElementById('debug').style.display = 'none'; }, 2000);
}

// ── Tracks ──
async function openPlaylist(pl) {
  // Show tracks tab (ensure it's visible)
  document.getElementById('tab-tracks').style.display = 'flex';
  document.getElementById('tracks-back-title').textContent = pl.name;
  switchTab('tracks');

  const content = document.getElementById('tracks-content');
  content.innerHTML = `
    <div class="playlist-hero">
      <img src="${pl.images?.[0]?.url || ''}" onerror="this.style.display='none'">
      <div>
        <h2>${escHtml(pl.name)}</h2>
        <p>${pl.tracks.total} songs</p>
      </div>
    </div>
    <button class="play-all-btn" onclick="playPlaylist('${pl.uri}')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Play All
    </button>
    <div class="loading-state"><div class="spinner"></div><span>Loading tracks…</span></div>`;

  const data = await api(`/playlists/${pl.id}/tracks?limit=100&fields=items(track(id,name,uri,duration_ms,artists,album(name,images)))`);
  if (!data || !data.items) {
    content.innerHTML += '<div class="error-state"><div class="error-box">Could not load tracks.</div></div>';
    return;
  }
  // Remove spinner
  content.querySelector('.loading-state')?.remove();

  data.items.forEach((item, i) => {
    const t = item?.track;
    if (!t) return;
    const art = t.album?.images?.[0]?.url || '';
    const artist = t.artists?.map(a => a.name).join(', ') || '';
    const row = document.createElement('div');
    row.className = 'track-row' + (t.id === currentTrackId ? ' playing' : '');
    row.dataset.trackId = t.id;
    row.innerHTML = `
      <img src="${art}" onerror="this.style.background='#333';this.removeAttribute('src')">
      <div class="track-row-info">
        <div class="track-name">${escHtml(t.name)}</div>
        <div class="track-meta">${escHtml(artist)} · ${escHtml(t.album?.name || '')}</div>
      </div>
      <span class="track-duration">${msToTime(t.duration_ms)}</span>`;
    row.onclick = () => playTrack(t.uri, pl.uri, i);
    content.appendChild(row);
  });
}

async function playPlaylist(contextUri) {
  await api('/me/player/play', 'PUT', { context_uri: contextUri });
  setTimeout(pollState, 800);
}

async function playTrack(trackUri, contextUri, offset) {
  await api('/me/player/play', 'PUT', { context_uri: contextUri, offset: { position: offset } });
  setTimeout(pollState, 800);
}

// ── Queue ──
async function loadQueue() {
  const qList = document.getElementById('queue-list');
  qList.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Loading queue…</span></div>';
  const data = await api('/me/player/queue');
  qList.innerHTML = '';
  if (!data) {
    qList.innerHTML = '<div class="empty-state">Could not load queue. Make sure Spotify is playing.</div>';
    return;
  }
  if (data.currently_playing) {
    const cp = data.currently_playing;
    const art = cp.album?.images?.[0]?.url || '';
    qList.innerHTML += `<div class="queue-now-playing-label">Now Playing</div>
      <div class="queue-item">
        <img src="${art}" onerror="this.style.background='#333';this.removeAttribute('src')">
        <div><div class="queue-item-name" style="color:var(--green)">${escHtml(cp.name)}</div>
        <div class="queue-item-artist">${escHtml(cp.artists?.map(a=>a.name).join(', ') || '')}</div></div>
      </div>`;
  }
  if (data.queue?.length) {
    qList.innerHTML += '<div class="queue-next-label">Next Up</div>';
    data.queue.slice(0, 30).forEach(t => {
      const art = t.album?.images?.[0]?.url || '';
      qList.innerHTML += `<div class="queue-item">
        <img src="${art}" onerror="this.style.background='#333';this.removeAttribute('src')">
        <div><div class="queue-item-name">${escHtml(t.name)}</div>
        <div class="queue-item-artist">${escHtml(t.artists?.map(a=>a.name).join(', ') || '')}</div></div>
      </div>`;
    });
  } else if (!data.currently_playing) {
    qList.innerHTML = '<div class="empty-state">Nothing in queue. Start playing something in Spotify.</div>';
  }
}

// ── Playback Controls ──
async function togglePlay() {
  await api(isPlaying ? '/me/player/pause' : '/me/player/play', 'PUT');
  isPlaying = !isPlaying;
  document.getElementById('play-icon').style.display = isPlaying ? 'none' : 'block';
  document.getElementById('pause-icon').style.display = isPlaying ? 'block' : 'none';
}
async function nextTrack() { await api('/me/player/next', 'POST'); setTimeout(pollState, 800); }
async function prevTrack() { await api('/me/player/previous', 'POST'); setTimeout(pollState, 800); }
async function seekTrack(e) {
  if (!trackDuration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  trackProgress = Math.floor(pct * trackDuration);
  updateProgressUI();
  await api(`/me/player/seek?position_ms=${trackProgress}`, 'PUT');
}

// ── Progress ──
function updateProgressUI() {
  if (!trackDuration) return;
  const pct = Math.min(100, (trackProgress / trackDuration) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('np-elapsed').textContent = msToTime(trackProgress);
  document.getElementById('np-duration').textContent = msToTime(trackDuration);
}
function startProgressTick() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (isPlaying) { trackProgress = Math.min(trackProgress + 1000, trackDuration); updateProgressUI(); }
  }, 1000);
}

// ── Poll State ──
async function pollState() {
  const state = await api('/me/player');
  if (!state || !state.item) return;
  const t = state.item;
  isPlaying = state.is_playing;
  trackDuration = t.duration_ms;
  trackProgress = state.progress_ms;
  document.getElementById('np-name').textContent = t.name;
  document.getElementById('np-artist').textContent = t.artists?.map(a => a.name).join(', ') || '';
  const artUrl = t.album?.images?.[0]?.url || '';
  const npArt = document.getElementById('np-art');
  if (artUrl) { npArt.src = artUrl; npArt.style.display = 'block'; }
  else { npArt.style.display = 'none'; }
  document.getElementById('play-icon').style.display = isPlaying ? 'none' : 'block';
  document.getElementById('pause-icon').style.display = isPlaying ? 'block' : 'none';
  updateProgressUI();
  if (t.id !== currentTrackId) {
    currentTrackId = t.id;
    document.querySelectorAll('.track-row').forEach(r => {
      r.classList.toggle('playing', r.dataset.trackId === t.id);
    });
  }
  // Set volume to 100% once on first poll
  if (!window._volSet) { window._volSet = true; api('/me/player/volume?volume_percent=100', 'PUT'); }
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
async function init() {
  const storedToken = localStorage.getItem('spotify_token');
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');

  // No token at all → show login
  if (!storedToken) {
    debug('No token found, showing login');
    showLogin();
    return;
  }

  // Token exists but expired and no refresh → clear and show login
  if (Date.now() > expiry - 60000) {
    const refreshed = await refreshToken();
    if (!refreshed) {
      showLogin();
      return;
    }
  }

  token = localStorage.getItem('spotify_token');
  if (!token) { showLogin(); return; }

  showApp();
  await loadPlaylists();
  await pollState();
  startProgressTick();
  setInterval(pollState, 10000);
}

init();
</script>
