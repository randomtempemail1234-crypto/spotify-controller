<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Controller</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1DB954;
    --black: #121212;
    --dark: #181818;
    --card: #282828;
    --card-hover: #333333;
    --text: #FFFFFF;
    --text-dim: #B3B3B3;
    --text-faint: #535353;
    --sidebar: 260px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--green); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 24px; background: linear-gradient(135deg, #1a1a2e 0%, #121212 60%); }
  #login-screen svg { width: 60px; height: 60px; }
  #login-screen h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
  #login-screen p { color: var(--text-dim); font-size: 14px; text-align: center; max-width: 280px; line-height: 1.5; }
  .btn-green { background: var(--green); color: #000; border: none; border-radius: 500px; padding: 14px 36px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: transform 0.1s, background 0.2s; }
  .btn-green:hover { background: #1ed760; transform: scale(1.03); }
  #app { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .main-layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: var(--sidebar); background: #000; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sidebar-logo { padding: 24px 20px 16px; display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; }
  .sidebar-logo svg { width: 28px; height: 28px; }
  .sidebar-section { padding: 8px 12px; flex: 1; overflow-y: auto; }
  .sidebar-section::-webkit-scrollbar { width: 4px; }
  .sidebar-section::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 2px; }
  .sidebar-label { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); padding: 8px 8px 6px; }
  .playlist-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
  .playlist-item:hover { background: var(--card); }
  .playlist-item.active { background: var(--card); }
  .playlist-item img { width: 36px; height: 36px; border-radius: 3px; object-fit: cover; background: var(--card-hover); flex-shrink: 0; }
  .playlist-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .playlist-item-meta { font-size: 11px; color: var(--text-dim); }
  .content { flex: 1; overflow-y: auto; background: linear-gradient(180deg, #2a2a2a 0%, var(--black) 300px); padding: 24px; }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 3px; }
  .content-header { display: flex; align-items: flex-end; gap: 20px; margin-bottom: 24px; }
  .content-header img { width: 180px; height: 180px; border-radius: 4px; object-fit: cover; box-shadow: 0 8px 40px rgba(0,0,0,0.5); background: var(--card); flex-shrink: 0; }
  .content-header-info h2 { font-size: 36px; font-weight: 700; letter-spacing: -1px; line-height: 1.1; margin-bottom: 8px; }
  .content-header-info p { font-size: 13px; color: var(--text-dim); }
  .play-all-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--green); color: #000; border: none; border-radius: 500px; padding: 12px 28px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 20px; transition: background 0.2s, transform 0.1s; }
  .play-all-btn:hover { background: #1ed760; transform: scale(1.02); }
  .track-list-header { display: grid; grid-template-columns: 40px 1fr 1fr 60px; gap: 12px; padding: 0 12px 8px; border-bottom: 1px solid var(--text-faint); margin-bottom: 4px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
  .track-row { display: grid; grid-template-columns: 40px 1fr 1fr 60px; gap: 12px; padding: 8px 12px; border-radius: 6px; cursor: pointer; align-items: center; transition: background 0.15s; }
  .track-row:hover { background: var(--card); }
  .track-row.playing { color: var(--green); }
  .track-num { font-size: 13px; color: var(--text-dim); text-align: center; }
  .track-row.playing .track-num { color: var(--green); }
  .track-info { display: flex; align-items: center; gap: 12px; overflow: hidden; }
  .track-info img { width: 40px; height: 40px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: var(--card-hover); }
  .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-artist { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-album { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-duration { font-size: 13px; color: var(--text-dim); text-align: right; }
  .queue-panel { width: 280px; background: var(--dark); border-left: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .queue-header { padding: 20px 16px 12px; font-size: 14px; font-weight: 700; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
  .queue-list { flex: 1; overflow-y: auto; padding: 8px; }
  .queue-list::-webkit-scrollbar { width: 4px; }
  .queue-list::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 2px; }
  .queue-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; }
  .queue-item img { width: 36px; height: 36px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: var(--card-hover); }
  .queue-item-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-item-artist { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-now-playing { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--green); padding: 8px 8px 4px; }
  .queue-next-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); padding: 12px 8px 4px; }
  .now-playing-bar { height: 90px; background: #181818; border-top: 1px solid #333; display: flex; align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0; }
  .np-info { display: flex; align-items: center; gap: 12px; width: 220px; flex-shrink: 0; }
  .np-info img { width: 52px; height: 52px; border-radius: 4px; object-fit: cover; background: var(--card); }
  .np-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artist { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-controls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .np-buttons { display: flex; align-items: center; gap: 20px; }
  .ctrl-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: color 0.15s, transform 0.1s; }
  .ctrl-btn:hover { color: var(--text); transform: scale(1.1); }
  .ctrl-btn.play-pause { background: white; color: black; width: 36px; height: 36px; border-radius: 50%; }
  .ctrl-btn.play-pause:hover { transform: scale(1.06); background: #e0e0e0; }
  .progress-bar-wrap { width: 100%; max-width: 500px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); }
  .progress-bar { flex: 1; height: 4px; background: var(--text-faint); border-radius: 2px; cursor: pointer; position: relative; }
  .progress-fill { height: 100%; background: var(--text-dim); border-radius: 2px; transition: width 1s linear; pointer-events: none; }
  .progress-bar:hover .progress-fill { background: var(--green); }
  .np-volume { display: flex; align-items: center; gap: 8px; width: 140px; flex-shrink: 0; justify-content: flex-end; }
  .volume-bar { width: 80px; height: 4px; background: var(--text-faint); border-radius: 2px; cursor: pointer; }
  .volume-fill { height: 100%; background: var(--text-dim); border-radius: 2px; }
  .volume-bar:hover .volume-fill { background: var(--green); }
  .device-warning { background: #2a2000; border: 1px solid #6a5000; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #ffd700; margin-bottom: 20px; line-height: 1.5; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--text-dim); gap: 12px; font-size: 14px; }
  .loading { color: var(--text-dim); font-size: 13px; padding: 20px; text-align: center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--text-faint); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
</style>
</head>
<body>

<div id="login-screen">
  <svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
  <h1>Spotify Controller</h1>
  <p>Browse playlists, pick songs and manage your queue. Play music in the Spotify tab, control it here.</p>
  <button class="btn-green" onclick="login()">Connect with Spotify</button>
</div>

<div id="app">
  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Controller
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Your Playlists</div>
        <div id="playlist-list"><div class="loading"><span class="spinner"></span>Loading...</div></div>
      </div>
    </div>

    <div class="content" id="main-content">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#535353" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>Select a playlist to get started</span>
      </div>
    </div>

    <div class="queue-panel">
      <div class="queue-header">Queue <span style="font-size:11px;color:var(--text-dim);font-weight:400" id="queue-device-label"></span></div>
      <div class="queue-list" id="queue-list">
        <div class="empty-state" style="height:120px;font-size:12px">Queue will appear here</div>
      </div>
    </div>
  </div>

  <div class="now-playing-bar">
    <div class="np-info">
      <img id="np-art" src="" style="display:none">
      <div>
        <div class="np-name" id="np-name">Not playing</div>
        <div class="np-artist" id="np-artist"></div>
      </div>
    </div>
    <div class="np-controls">
      <div class="np-buttons">
        <button class="ctrl-btn" onclick="prevTrack()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-pause" id="play-pause-btn" onclick="togglePlay()">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.64L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
      <div class="progress-bar-wrap">
        <span id="np-elapsed">0:00</span>
        <div class="progress-bar" id="progress-bar" onclick="seekTrack(event)">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <span id="np-duration">0:00</span>
      </div>
    </div>
    <div class="np-volume">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-dim)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <div class="volume-bar" onclick="setVolume(event)">
        <div class="volume-fill" id="volume-fill" style="width:70%"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '924611eb26024497a967813388fcba01';
const REDIRECT_URI = 'https://randomtempemail1234-crypto.github.io/spotify-controller/callback.html';
const SCOPES = 'user-read-playback-state user-modify-playback-state playlist-read-private playlist-read-collaborative user-read-currently-playing';

let token = null;
let currentPlaylist = null;
let currentTrackId = null;
let isPlaying = false;
let progressInterval = null;
let trackDuration = 0;
let trackProgress = 0;

function base64urlencode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function login() {
  const verifier = base64urlencode(crypto.getRandomValues(new Uint8Array(32)));
  const encoder = new TextEncoder();
  const digest = await crypto.subtle.digest('SHA-256', encoder.encode(verifier));
  const challenge = base64urlencode(digest);
  localStorage.setItem('pkce_verifier', verifier);
  const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}&code_challenge_method=S256&code_challenge=${challenge}`;
  window.location.href = url;
}

async function refreshToken() {
  const refresh = localStorage.getItem('spotify_refresh_token');
  if (!refresh) { login(); return; }
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: refresh, client_id: CLIENT_ID })
  });
  const data = await res.json();
  if (data.access_token) {
    token = data.access_token;
    localStorage.setItem('spotify_token', token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
  } else { login(); }
}

async function ensureToken() {
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) await refreshToken();
  token = localStorage.getItem('spotify_token');
}

async function api(endpoint, method = 'GET', body = null) {
  await ensureToken();
  const opts = { method, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`https://api.spotify.com/v1${endpoint}`, opts);
  if (res.status === 401) { await refreshToken(); return api(endpoint, method, body); }
  if (res.status === 204 || res.status === 202) return null;
  if (!res.ok) return null;
  return res.json().catch(() => null);
}

function msToTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

async function loadPlaylists() {
  const data = await api('/me/playlists?limit=50');
  if (!data) return;
  const list = document.getElementById('playlist-list');
  list.innerHTML = '';
  data.items.forEach(pl => {
    const img = pl.images?.[0]?.url || '';
    const div = document.createElement('div');
    div.className = 'playlist-item';
    div.innerHTML = `<img src="${img}" onerror="this.style.background='#333';this.src=''"><div class="playlist-item-info"><div class="playlist-item-name">${pl.name}</div><div class="playlist-item-meta">${pl.tracks.total} songs</div></div>`;
    div.onclick = () => loadPlaylist(pl, div);
    list.appendChild(div);
  });
}

async function loadPlaylist(pl, el) {
  document.querySelectorAll('.playlist-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentPlaylist = pl;
  const content = document.getElementById('main-content');
  content.innerHTML = `<div class="loading"><span class="spinner"></span>Loading playlist...</div>`;
  const data = await api(`/playlists/${pl.id}/tracks?limit=100`);
  if (!data) return;
  const img = pl.images?.[0]?.url || '';
  content.innerHTML = `
    <div class="content-header">
      <img src="${img}" onerror="this.style.background='#333';this.src=''">
      <div class="content-header-info">
        <p style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Playlist</p>
        <h2>${pl.name}</h2>
        <p style="margin-top:8px">${pl.tracks.total} songs</p>
      </div>
    </div>
    <div id="device-warning-area"></div>
    <button class="play-all-btn" onclick="playPlaylist()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play All
    </button>
    <div class="track-list-header"><span>#</span><span>Title</span><span>Album</span><span style="text-align:right">Time</span></div>
    <div id="track-list"></div>`;
  const trackList = document.getElementById('track-list');
  data.items.forEach((item, i) => {
    if (!item.track) return;
    const t = item.track;
    const art = t.album?.images?.[0]?.url || '';
    const row = document.createElement('div');
    row.className = 'track-row' + (t.id === currentTrackId ? ' playing' : '');
    row.dataset.trackId = t.id;
    row.innerHTML = `
      <span class="track-num">${i + 1}</span>
      <div class="track-info"><img src="${art}" onerror="this.style.background='#333';this.src=''"><div><div class="track-name">${t.name}</div><div class="track-artist">${t.artists.map(a => a.name).join(', ')}</div></div></div>
      <div class="track-album">${t.album?.name || ''}</div>
      <div class="track-duration">${msToTime(t.duration_ms)}</div>`;
    row.onclick = () => playTrack(t.uri, pl.uri);
    trackList.appendChild(row);
  });
  checkDeviceWarning();
}

async function checkDeviceWarning() {
  const state = await api('/me/player');
  const area = document.getElementById('device-warning-area');
  if (!area) return;
  if (!state || !state.device) {
    area.innerHTML = `<div class="device-warning">⚠️ No active Spotify device found. Open <strong>open.spotify.com</strong> in another Safari tab and start playing something, then come back here.</div>`;
  } else {
    area.innerHTML = '';
  }
}

async function playTrack(uri, contextUri) {
  const body = contextUri ? { context_uri: contextUri, offset: { uri } } : { uris: [uri] };
  await api('/me/player/play', 'PUT', body);
  setTimeout(pollState, 500);
}

async function playPlaylist() {
  if (!currentPlaylist) return;
  await api('/me/player/play', 'PUT', { context_uri: currentPlaylist.uri });
  setTimeout(pollState, 500);
}

async function togglePlay() {
  if (isPlaying) { await api('/me/player/pause', 'PUT'); }
  else { await api('/me/player/play', 'PUT'); }
  setTimeout(pollState, 300);
}

async function nextTrack() { await api('/me/player/next', 'POST'); setTimeout(pollState, 500); }
async function prevTrack() { await api('/me/player/previous', 'POST'); setTimeout(pollState, 500); }

async function seekTrack(e) {
  if (!trackDuration) return;
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const ms = Math.floor(pct * trackDuration);
  await api(`/me/player/seek?position_ms=${ms}`, 'PUT');
  trackProgress = ms;
  updateProgressUI();
}

async function setVolume(e) {
  const bar = e.currentTarget;
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const vol = Math.floor(pct * 100);
  document.getElementById('volume-fill').style.width = vol + '%';
  await api(`/me/player/volume?volume_percent=${vol}`, 'PUT');
}

function updateProgressUI() {
  if (!trackDuration) return;
  const pct = Math.min(100, (trackProgress / trackDuration) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('np-elapsed').textContent = msToTime(trackProgress);
  document.getElementById('np-duration').textContent = msToTime(trackDuration);
}

function startProgressTick() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (isPlaying) { trackProgress = Math.min(trackProgress + 1000, trackDuration); updateProgressUI(); }
  }, 1000);
}

async function pollState() {
  const state = await api('/me/player');
  if (!state || !state.item) return;
  const t = state.item;
  isPlaying = state.is_playing;
  trackDuration = t.duration_ms;
  trackProgress = state.progress_ms;
  document.getElementById('np-name').textContent = t.name;
  document.getElementById('np-artist').textContent = t.artists.map(a => a.name).join(', ');
  const art = t.album?.images?.[0]?.url || '';
  const npArt = document.getElementById('np-art');
  npArt.src = art; npArt.style.display = art ? 'block' : 'none';
  document.getElementById('play-icon').style.display = isPlaying ? 'none' : 'block';
  document.getElementById('pause-icon').style.display = isPlaying ? 'block' : 'none';
  updateProgressUI();
  if (t.id !== currentTrackId) {
    currentTrackId = t.id;
    document.querySelectorAll('.track-row').forEach(r => r.classList.toggle('playing', r.dataset.trackId === t.id));
  }
  const qData = await api('/me/player/queue');
  if (qData) {
    const qList = document.getElementById('queue-list');
    qList.innerHTML = '';
    if (qData.currently_playing) {
      const cp = qData.currently_playing;
      const art = cp.album?.images?.[0]?.url || '';
      qList.innerHTML += `<div class="queue-now-playing">Now Playing</div><div class="queue-item"><img src="${art}"><div class="queue-item-info"><div class="queue-item-name" style="color:var(--green)">${cp.name}</div><div class="queue-item-artist">${cp.artists.map(a=>a.name).join(', ')}</div></div></div>`;
    }
    if (qData.queue?.length) {
      qList.innerHTML += `<div class="queue-next-label">Next Up</div>`;
      qData.queue.slice(0, 20).forEach(t => {
        const art = t.album?.images?.[0]?.url || '';
        qList.innerHTML += `<div class="queue-item"><img src="${art}"><div class="queue-item-info"><div class="queue-item-name">${t.name}</div><div class="queue-item-artist">${t.artists.map(a=>a.name).join(', ')}</div></div></div>`;
      });
    }
  }
  document.getElementById('queue-device-label').textContent = state.device?.name || '';
}

async function init() {
  token = localStorage.getItem('spotify_token');
  if (!token) return;
  const expiry = parseInt(localStorage.getItem('spotify_token_expiry') || '0');
  if (Date.now() > expiry - 60000) await refreshToken();
  token = localStorage.getItem('spotify_token');
  if (!token) return;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  await loadPlaylists();
  await pollState();
  startProgressTick();
  setInterval(pollState, 10000);
}

init();
</script>
</body>
</html>
