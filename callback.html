<!DOCTYPE html>
<html>
<head><title>Logging in...</title>
<style>
  body { font-family: sans-serif; background: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
  .error { color: #ff6b6b; background: #2a1111; padding: 16px; border-radius: 8px; max-width: 400px; font-size: 13px; word-break: break-all; }
</style>
</head>
<body>
<p>Logging in...</p>
<script>
const CLIENT_ID = '924611eb26024497a967813388fcba01';
const REDIRECT_URI = 'https://randomtempemail1234-crypto.github.io/spotify-controller/callback.html';

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    document.body.innerHTML = `<p>Login failed: ${error}</p><a href="index.html" style="color:#1DB954">Try again</a>`;
    return;
  }

  if (!code) {
    document.body.innerHTML = `<p class="error">No code in URL. Params: ${window.location.search}</p><a href="index.html" style="color:#1DB954">Try again</a>`;
    return;
  }

  const verifier = localStorage.getItem('pkce_verifier');
  if (!verifier) {
    document.body.innerHTML = `<p class="error">No PKCE verifier found in storage. Please try logging in again.</p><a href="index.html" style="color:#1DB954">Try again</a>`;
    return;
  }

  try {
    const response = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        client_id: CLIENT_ID,
        code_verifier: verifier
      })
    });

    const data = await response.json();

    if (data.access_token) {
      localStorage.setItem('spotify_token', data.access_token);
      if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
      localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
      localStorage.removeItem('pkce_verifier');
      window.location.href = 'index.html';
    } else {
      document.body.innerHTML = `<p class="error">Token error: ${JSON.stringify(data)}</p><a href="index.html" style="color:#1DB954">Try again</a>`;
    }
  } catch(e) {
    document.body.innerHTML = `<p class="error">Network error: ${e.message}</p><a href="index.html" style="color:#1DB954">Try again</a>`;
  }
}

handleCallback();
</script>
</body>
</html>
