<!DOCTYPE html>
<html>
<head><title>Logging in...</title></head>
<body>
<script>
const CLIENT_ID = '924611eb26024497a967813388fcba01';
const REDIRECT_URI = 'https://randomtempemail1234-crypto.github.io/spotify-controller/callback.html';

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) { document.body.innerText = 'Login failed. No code received.'; return; }
  const verifier = localStorage.getItem('pkce_verifier');
  if (!verifier) { document.body.innerText = 'Login failed. No verifier found.'; return; }
  const response = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code,
      redirect_uri: REDIRECT_URI,
      client_id: CLIENT_ID,
      code_verifier: verifier
    })
  });
  const data = await response.json();
  if (data.access_token) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_refresh_token', data.refresh_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    localStorage.removeItem('pkce_verifier');
    window.location.href = 'index.html';
  } else {
    document.body.innerText = 'Login failed: ' + JSON.stringify(data);
  }
}
handleCallback();
</script>
</body>
</html>
